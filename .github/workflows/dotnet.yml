name: CI/CD Deploy VPS

on:
  push:
    branches:
      - main
  pull_request:
    branches: [ "main", "Develop" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: DockerHub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -f Dockerfile \
            -t ${{ secrets.DOCKER_USER }}/events-api:latest \
            .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USER }}/events-api:latest

      # Copia el docker-compose.prod.yml a la VPS
      - name: Copiar docker-compose.prod.yml a la VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: "docker-compose.prod.yml"
          target: "/Ismael/spring-8/tickets/api"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            cd /Ismael/spring-8/tickets/api

            echo "── Pull latest image ──"
            docker pull ${{ secrets.DOCKER_USER }}/events-api:latest

            echo "── Bajar servicios anteriores ──"
            docker compose -f docker-compose.prod.yml down

            echo "── Levantar servicios con variables ──"
            DOCKER_USER=${{ secrets.DOCKER_USER }} \
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
            MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }} \
            MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }} \
            JWT_KEY=${{ secrets.JWT_KEY }} \
            EMAIL_USERNAME=${{ secrets.EMAIL_USERNAME }} \
            EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }} \
            docker compose -f docker-compose.prod.yml up -d

            echo "── Esperar arranque ──"
            sleep 8
            docker compose -f docker-compose.prod.yml ps

            echo "── Limpiar imágenes huérfanas ──"
            docker image prune -f

            echo "✅ Deploy completado"
