services:
  mysql:
    image: mysql:8.0

    container_name: events-mysql

    restart: unless-stopped

    ports:
      - "3306:3306"

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: events_db
      MYSQL_USER: events_user
      MYSQL_PASSWORD: events_pass

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - tickets-network

volumes:
  mysql_data:

networks:
  tickets-network:
    external: true