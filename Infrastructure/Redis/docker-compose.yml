version: '3.9'

services:
  redis:
    image: redis:7-alpine

    container_name: events-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    networks:
      - tickets-network

volumes:
  redis_data:

networks:
  tickets-network:
    external: true