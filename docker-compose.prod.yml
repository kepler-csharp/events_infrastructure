services:

  # ─────────────────────────────────────────
  # MySQL 8
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: api-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: tickets_api_general
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tickets-net
    healthcheck:
      # Sin -p para que no falle cuando el password tiene caracteres especiales
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: api-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - tickets-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MinIO
  # ─────────────────────────────────────────
  minio:
    image: quay.io/minio/minio:latest
    container_name: api-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    networks:
      - tickets-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────
  # Inicializar bucket público en MinIO
  # ─────────────────────────────────────────
  minio-init:
    image: quay.io/minio/minio:latest
    container_name: api-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/user-photos &&
        mc anonymous set public local/user-photos &&
      
        mc mb --ignore-existing local/ticket-qrcodes &&
        mc anonymous set public local/ticket-qrcodes &&
        echo 'Bucket user-photos creado y configurado como público.'
      "
    networks:
      - tickets-net
    restart: on-failure

  # ─────────────────────────────────────────
  # API — imagen de DockerHub (producción)
  # ─────────────────────────────────────────
  api:
    image: ${DOCKER_USER}/events-api:latest
    container_name: api-tickets
    restart: unless-stopped
    ports:
      - "5201:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "server=mysql;port=3306;database=tickets_api_general;user=root;password=${MYSQL_ROOT_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379"
      ConnectionStrings__RedisOut: "${HOST}:6380"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: TicketsAPI
      Jwt__Audience: TicketsUsers
      Jwt__ExpireMinutes: "60"
      Jwt__RefreshExpireDays: "1"
      Minio__Endpoint: "minio:9000"
      Minio__EndpointOut: "${HOST}:9002
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__Bucket: user-photos
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - tickets-net

volumes:
  mysql_data:
  redis_data:
  minio_data:

networks:
  tickets-net:
    driver: bridge
